<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recently Added - Rate the Movie</title>
    <link rel="stylesheet" href="/css/recently_added.css">
</head>
<body>

    <!-- Review Modal -->
    <div id="reviewModal" class="modal">

        <div class="modal-content">

            <button id="closeModal">&times;</button>

            <h2 id="movieTitle"></h2>

            <p>
                Current Rating:
                <span id="movieRating"></span>/10
            </p>

            <label for="userRating">Your Rating</label>

            <select id="userRating">
                <option value="10">10 ⭐</option>
                <option value="9">9 ⭐</option>
                <option value="8">8 ⭐</option>
                <option value="7">7 ⭐</option>
                <option value="6">6 ⭐</option>
                <option value="5">5 ⭐</option>
                <option value="4">4 ⭐</option>
                <option value="3">3 ⭐</option>
                <option value="2">2 ⭐</option>
                <option value="1">1 ⭐</option>
            </select>

            <textarea
                id="reviewText"
                placeholder="Write your review..."
            ></textarea>

            <button id="submitReview">
                Submit Review
            </button>

        </div>

    </div>

    <header>

        <nav>

            <a href="index.html" class="logo">
                Rate the Movie
            </a>

            <ul>
                <li><a href="index.html">Home</a></li>

                <li><a href="top_rated.html">Top Rated</a></li>
                <li><a href="recently_added.html">Recently Added</a></li>
            </ul>

        </nav>

    </header>
